<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 1 – Ordena la Historia del Puente del Payaso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,#1a472a,#2d6a2d,#4a3728);
  min-height:100vh; padding:16px;
}

/* CABECERA */
.cab{
  max-width:900px; margin:0 auto 16px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.titulo{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.4rem,4vw,2rem);
  color:#e8b84b;
  text-shadow:2px 2px 0 rgba(0,0,0,.5);
  flex:1;
}
.badge{
  background:#4caf50; color:#fff;
  border-radius:20px; padding:5px 14px;
  font-size:.78rem; font-weight:800; letter-spacing:.5px;
}
.puntos{
  background:rgba(0,0,0,.35); border:2px solid #e8b84b;
  border-radius:12px; padding:6px 16px;
  color:#e8b84b; font-family:'Fredoka One',cursive; font-size:1rem;
}

/* CAJA PRINCIPAL */
.caja{
  max-width:900px; margin:0 auto;
  background:#fdf6e3; border-radius:20px;
  padding:22px; border:4px solid #e8b84b;
  box-shadow:0 8px 30px rgba(0,0,0,.45);
}

/* INSTRUCCIONES */
.instruc{
  background:#e8f5e9; border:2px dashed #4caf50;
  border-radius:14px; padding:14px 18px;
  margin-bottom:18px;
  font-size:1.05rem; font-weight:800; color:#2d6a2d;
  line-height:1.6; text-align:center;
}
.instruc .pasos{
  display:flex; justify-content:center; gap:20px;
  margin-top:10px; flex-wrap:wrap;
}
.paso{
  background:#fff; border-radius:12px; padding:8px 14px;
  font-size:.9rem; color:#333; font-weight:700;
  border:2px solid #c8e6c9;
  display:flex; align-items:center; gap:6px;
}

/* BARRA */
.barra-w{background:rgba(0,0,0,.1);border-radius:20px;height:12px;margin-bottom:18px;overflow:hidden}
.barra-f{height:100%;background:linear-gradient(90deg,#4caf50,#e8b84b);border-radius:20px;transition:width .4s}

/* GRID DE TARJETAS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}
@media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr);}}

.tarjeta{
  background:#fff; border:3px solid #ddd; border-radius:16px;
  overflow:hidden; cursor:grab;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  user-select:none; position:relative;
}
.tarjeta:hover{border-color:#3498db;box-shadow:0 4px 14px rgba(52,152,219,.25);transform:scale(1.03);}
.tarjeta.arrastrando{opacity:.35;transform:scale(.95);}
.tarjeta.encima{border-color:#4caf50;box-shadow:0 0 0 3px rgba(76,175,80,.3);}
.tarjeta.correcta{border-color:#4caf50!important;box-shadow:0 0 0 3px rgba(76,175,80,.35)!important;}
.tarjeta.incorrecta{border-color:#c0392b!important;box-shadow:0 0 0 3px rgba(192,57,43,.3)!important;animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.tarjeta img{
  width:100%; aspect-ratio:4/3; object-fit:cover; display:block;
  pointer-events:none;
}
.tarjeta-pie{
  padding:8px 10px;
  display:flex; align-items:center; gap:8px;
}
.num-badge{
  background:#3498db; color:#fff;
  border-radius:50%; width:28px; height:28px; min-width:28px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive; font-size:.9rem; flex-shrink:0;
}
.tarjeta-texto{
  font-size:.78rem; font-weight:800; color:#333; line-height:1.3;
  flex:1;
}

/* MARCAS de correcto/incorrecto en tarjeta */
.marca{
  position:absolute; top:6px; right:6px;
  width:28px; height:28px; border-radius:50%;
  display:none; align-items:center; justify-content:center;
  font-size:1rem; font-weight:900;
}
.tarjeta.correcta  .marca{display:flex;background:#4caf50;color:#fff;}
.tarjeta.incorrecta .marca{display:flex;background:#c0392b;color:#fff;}

/* BOTÓN */
.btn-v{
  display:block; width:100%; padding:15px;
  border-radius:50px; font-family:'Fredoka One',cursive;
  font-size:1.25rem; color:#fff;
  background:linear-gradient(135deg,#2d6a2d,#4caf50);
  border:none; cursor:pointer;
  box-shadow:0 4px 14px rgba(76,175,80,.4);
  transition:transform .15s;
}
.btn-v:hover{transform:scale(1.02);}
.btn-v:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* RESULTADO */
.resultado{text-align:center;padding:28px 16px;animation:pop .4s ease;}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.res-em{font-size:5rem;display:block;margin-bottom:12px;}
.res-tit{font-family:'Fredoka One',cursive;font-size:2rem;color:#6b3a2a;margin-bottom:10px;}
.estrellas{font-size:2.5rem;margin-bottom:14px;}
.res-txt{font-size:1rem;color:#555;line-height:1.6;margin-bottom:16px;}
.moraleja{
  background:#fff8e1;border:2px solid #e8b84b;border-radius:12px;
  padding:12px 16px;font-size:.95rem;color:#6b3a2a;font-style:italic;
  margin-bottom:22px;line-height:1.5;
}
.btn-nuevo{
  padding:13px 32px;border-radius:50px;
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;
  background:linear-gradient(135deg,#e67e22,#e8b84b);
  border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(230,126,34,.4);transition:transform .15s;
}
.btn-nuevo:hover{transform:scale(1.04);}

/* CONFETI */
.confeti-layer{pointer-events:none;position:fixed;inset:0;z-index:999;overflow:hidden;}
.c{position:absolute;top:-20px;animation:caer linear forwards;}
@keyframes caer{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="confeti-layer" id="cf"></div>

<div class="cab">
  <h1 class="titulo">🎭 ¿En qué orden pasó?</h1>
  <span class="badge">3.º Básica · 7-8 años</span>
  <div class="puntos" id="pts">⭐ 0 pts</div>
</div>

<div class="caja" id="caja"></div>

      <div class="pasos">
        <div class="paso">1️⃣ Mira los dibujos</div>
        <div class="paso">2️⃣ Arrástralos en orden</div>
        <div class="paso">3️⃣ Pulsa el botón verde</div>
      </div>
    </div>
    <div class="barra-w"><div class="barra-f" id="barra" style="width:0%"></div></div>
    <div class="grid" id="grid">
      ${orden.map((e,i) => `
        <div class="tarjeta" draggable="true" data-i="${i}"
          ondragstart="ds(event)" ondragover="dov(event)"
          ondragleave="dl(event)" ondrop="dd(event)">
          <div class="marca" id="marca-${i}">✓</div>
          <img src="${e.img}" alt="${e.texto}" loading="lazy">
          <div class="tarjeta-pie">
            <div class="num-badge" id="nb-${i}">${i+1}</div>
            <div class="tarjeta-texto">${e.texto}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn-v" id="btnV" onclick="verificar()">✅ ¡Listo! Verificar</button>
  `;
}

function ds(e){dragSrc=e.currentTarget;dragSrc.classList.add('arrastrando');e.dataTransfer.effectAllowed='move';}
function dov(e){e.preventDefault();e.currentTarget.classList.add('encima');}
function dl(e){e.currentTarget.classList.remove('encima');}
function dd(e){
  e.preventDefault();
  const t=e.currentTarget;
  t.classList.remove('encima');
  dragSrc.classList.remove('arrastrando');
  if(dragSrc===t)return;
  const g=document.getElementById('grid');
  const ns=[...g.children];
  const a=ns.indexOf(dragSrc), b=ns.indexOf(t);
  [orden[a],orden[b]]=[orden[b],orden[a]];
  a<b?g.insertBefore(dragSrc,t.nextSibling):g.insertBefore(dragSrc,t);
  [...g.children].forEach((el,i)=>el.querySelector('.num-badge').textContent=i+1);
}

function verificar(){
  if(listo)return;
  intentos++;
  const g=document.getElementById('grid');
  const ns=[...g.children];
  let ok=0;
  ns.forEach((n,i)=>{
    const bien=orden[i]===ESCENAS[i];
    n.classList.remove('correcta','incorrecta');
    void n.offsetWidth;
    n.classList.add(bien?'correcta':'incorrecta');
    const m=n.querySelector('.marca');
    m.textContent=bien?'✓':'✗';
    if(bien)ok++;
  });
  puntos=ok*10+(intentos===1?20:0);
  document.getElementById('pts').textContent=`⭐ ${puntos} pts`;
  document.getElementById('barra').style.width=`${Math.round(ok/ESCENAS.length*100)}%`;

  if(ok===ESCENAS.length){
    listo=true; confeti();
    setTimeout(()=>resultado(true),700);
  } else {
    const btn=document.getElementById('btnV');
    if(intentos<3){
      btn.textContent=`🔄 Intentar de nuevo (${3-intentos} intento${3-intentos!==1?'s':''} más)`;
    } else {
      listo=true; setTimeout(()=>resultado(false),600);
    }
  }
}

function resultado(gano){
  const pct=puntos/100;
  const est=pct>=.85?'⭐⭐⭐':pct>=.55?'⭐⭐':'⭐';
  if(gano)confeti();
  document.getElementById('caja').innerHTML=`
    <div class="resultado">
      <span class="res-em">${gano?'🎉':'💪'}</span>
      <h2 class="res-tit">${gano?'¡Lo lograste!':'¡Buen intento!'}</h2>
      <div class="estrellas">${est}</div>
      <p class="res-txt">${gano
        ?`¡Ordenaste todos los dibujos correctamente!<br>Obtuviste <strong>${puntos} puntos</strong>. ¡Eres increíble! 🤡`
        :`No te rindas, vuelve a intentarlo.<br>Obtuviste <strong>${puntos} puntos</strong>.`}
      </p>
      <div class="moraleja">🌉 <em>"Nunca tomes más de lo que puedas soportar."</em></div>
      <button class="btn-nuevo" onclick="init()">🔄 Jugar de nuevo</button>
    </div>
  `;
}

function confeti(){
  const c=document.getElementById('cf'); c.innerHTML='';
  const cols=['#e8b84b','#4caf50','#3498db','#e74c3c','#9b59b6','#1abc9c'];
  for(let i=0;i<80;i++){
    const d=document.createElement('div'); d.className='c';
    const s=8+Math.random()*10;
    d.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};
      width:${s}px;height:${s}px;border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    c.appendChild(d);
  }
  setTimeout(()=>c.innerHTML='',3500);
}

init();
</script>
</body>
</html>
